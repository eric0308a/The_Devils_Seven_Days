name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Verify no LFS pointer in www
        run: |
          if grep -RIl "version https://git-lfs.github.com/spec/v1" www; then
            echo "Found unresolved Git LFS pointer files in www/."
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Add .nojekyll
        run: touch www/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./www

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
